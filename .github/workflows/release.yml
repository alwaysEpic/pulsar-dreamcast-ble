name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: xiao
            features: board-xiao
          - board: dk
            features: board-dk
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-binutils
        run: cargo install cargo-binutils

      - name: Build release
        run: cargo build --release --no-default-features --features ${{ matrix.features }}

      - name: Convert ELF to HEX
        run: |
          rust-objcopy -O ihex \
            target/thumbv7em-none-eabihf/release/pulsar-dreamcast-ble \
            pulsar-dreamcast-ble-${{ matrix.board }}.hex

      - name: Convert HEX to UF2
        if: matrix.board == 'xiao'
        run: |
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o uf2conv.py
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o uf2families.json
          python3 uf2conv.py \
            -c -f 0xADA52840 \
            -o pulsar-dreamcast-ble-xiao.uf2 \
            pulsar-dreamcast-ble-xiao.hex

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: pulsar-dreamcast-ble-${{ matrix.board }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la pulsar-dreamcast-ble-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: pulsar-dreamcast-ble-*
